services:

  # ==================== BASE DE DATOS ====================
  mysql:
    image: mysql:8.0
    container_name: progresofit-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: progresofit
      MYSQL_USER: progresofit_user
      MYSQL_PASSWORD: progresofit_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ==================== BACKEND NODE.JS ====================
  backend:
    container_name: progresofit-backend
    restart: always
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: tu_clave_secreta_super_segura_aqui_123456
      DB_HOST: mysql
      DB_USER: progresofit_user
      DB_PASSWORD: progresofit_pass
      DB_NAME: progresofit
    depends_on:
      mysql:
        condition: service_healthy

  # ==================== FRONTEND PHP ====================
  frontend:
    container_name: progresofit-frontend
    restart: always
    build: .
    ports:
      - "8000:8000"
    environment:
      API_BASE_URL: http://backend:3000
    depends_on:
      - backend

volumes:
  mysql_data:
